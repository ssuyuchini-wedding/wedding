<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Opening -->
<section id="opening">
<div class="door door-left"></div>
<div class="door door-right"></div>
<div class="opening-content">
<div class="happiness-tag">囍</div>
<p class="opening-title">囍事將啟</p>
</div>
<a class="opening-hint">輕觸開啟囍門</a>
</section>
<!-- Hero -->
<section id="hero">
<img class="hero-photo" src="hero.jpg" alt="新人婚紗照">
<div class="hero-overlay"></div>
<div class="hero-frame"></div>
<div class="floating-xi xi-one">囍</div>
<div class="hero-content">
    <div class="hero-seal">囍</div>
<p class="hero-invitation">敬愛的親友，誠摯邀請您蒞臨</p>
<h1 class="hero-names">
           周思妤<br>
           林晉億
</h1>
<p class="hero-english">
           SSU-YU &amp; CHIN-I
</p>
<p class="hero-date">
           2027 年 2 月 28 日 ・ 星期日
</p>
<div class="countdown" aria-label="婚禮倒數">
<div class="countdown-item">
<span id="countdown-days">000</span>
<small>天</small>
</div>
<div class="countdown-item">
<span id="countdown-hours">00</span>
<small>時</small>
</div>
<div class="countdown-item">
<span id="countdown-minutes">00</span>
<small>分</small>
</div>
<div class="countdown-item">
<span id="countdown-seconds">00</span>
<small>秒</small>
</div>
</div>
</section>
<!-- Invitation -->
<section id="invitation">
</section>
<!-- Gallery -->
<section id="gallery">
</section>
<!-- Wedding Information -->
<section id="information">
</section>
<!-- Transportation -->
<section id="transportation">
</section>
<!-- FAQ -->
<section id="faq">
</section>
<!-- RSVP -->
<section id="rsvp">
</section>
<!-- Thank You -->
<section id="thankyou">
</section>
<script src="script.js"></script>
</body>
</html>
