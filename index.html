<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="no-scroll">
<!-- Opening -->
<section id="opening">
<div class="door door-left"></div>
<div class="door door-right"></div>
<div class="opening-content">
<div class="happiness-tag">囍</div>
<p class="opening-title">囍事將啟</p>
</div>
<a class="opening-hint">輕觸開啟囍門</a>
</section>
<!-- Hero -->
<section id="hero">
<img class="hero-photo" src="hero.jpg" alt="新人婚紗照">
<div class="hero-overlay"></div>
<div class="hero-frame"></div>
<div class="floating-xi xi-one">囍</div>
<div class="hero-content">
    <div class="hero-seal">囍</div>
<p class="hero-invitation">敬愛的親友，誠摯邀請您蒞臨</p>
<h1 class="hero-names">
           周思妤<br>
           林晉億
</h1>
<p class="hero-english">
           SSU-YU &amp; CHIN-I
</p>
<p class="hero-date">
           2027 年 2 月 28 日 ・ 星期日
</p>
<div class="countdown" aria-label="婚禮倒數">
<div class="countdown-item">
<span id="countdown-days">000</span>
<small>天</small>
</div>
<div class="countdown-item">
<span id="countdown-hours">00</span>
<small>時</small>
</div>
<div class="countdown-item">
<span id="countdown-minutes">00</span>
<small>分</small>
</div>
<div class="countdown-item">
<span id="countdown-seconds">00</span>
<small>秒</small>
</div>
</div>
</div>
<button class="scroll-hint" id="scrollHint" aria-label="Scroll down">
<span class="scroll-arrow"></span>
</button>
</section>
<!-- Invitation -->
<section id="invitation" class="invitation-section gold-dust">
<div class="section-inner">
<p class="section-kicker">OUR WEDDING</p>
<h2 class="invitation-title">
           誠摯邀請您<br>
           一同見證我們的重要時刻
</h2>
<div class="invitation-divider">
<span></span>
<b id="invitationSeal">囍</b>
<span></span>
</div>
<p class="invitation-text">
           謝謝您一路以來的陪伴與祝福。<br>
           我們誠摯邀請您蒞臨婚禮，<br>
           與我們共享這份喜悅。
</p>
</div>
</section>
<!-- Fate -->
<section id="fate" class="fate-section gold-dust">
<div class="floating-seed" aria-hidden="true">
<img src="assets/seed.svg" alt="">
</div>
<div class="fate-inner">
<div class="fate-heading">
<span class="fate-line"></span>
<h2 class="fate-title">緣</h2>
<span class="fate-line"></span>
</div>
<div class="fate-story">
<p class="fate-text fate-line1">
       有些故事，
</p>
<p class="fate-text fate-line2">
       從一顆種子開始。
</p>
<p class="fate-text fate-line3">
       那是一顆桃花心木種子。
</p>
</div>
</div>
</section>
<!-- Gallery -->
<section id="gallery">
</section>
<!-- Wedding Information -->
<section id="information">
</section>
<!-- Transportation -->
<section id="transportation">
</section>
<!-- FAQ -->
<section id="faq">
</section>
<!-- RSVP -->
<section id="rsvp">
</section>
<!-- Thank You -->
<section id="thankyou">
</section>
<script src="script.js"></script>
</body>
</html>
